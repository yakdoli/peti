# 관보 크롤러 설정
crawler:
  start_date: "1994-01-01"
  end_date: "today"
  api_base_url: "https://open.gwanbo.go.kr/OpenApi/web/petyList"
  timeout: 30
  max_retries: 3
  retry_delay: 2
  window_days: 31
  row_per_page: 10
  headless: true
  browser_executable_path: ""
  themes:
    pety:
      thema_se: "02"
      list_url: "https://open.gwanbo.go.kr/OpenApi/web/petyList"
      ajax_url: "https://open.gwanbo.go.kr/OpenApi/web/petyListAjax"
      detail_url: "https://open.gwanbo.go.kr/OpenApi/web/commonApiWebDetail"
      viewer_base_url: "https://gwanbo.go.kr/"
      row_per_page: 10
    searchThema:
      tab_type: "1"
      search_api_url: "https://gwanbo.go.kr/SearchRestApi.jsp"
      theme_info_url: "https://gwanbo.go.kr/user/search/getThemeBaseInfo.do"
      viewer_base_url: "https://gwanbo.go.kr/"
      index: "gwanbo"
      list_size: 10
      year_start: 1994
      year_end: "current"
      institutions:
        - "정부공직자윤리위원회"
        - "대법원공직자윤리위원회"
        - "중앙선거관리위원회공직자윤리위원회"
      institution_query_map:
        정부공직자윤리위원회: "정부공직자"
        대법원공직자윤리위원회: "대법원"
        중앙선거관리위원회공직자윤리위원회: "중앙선거관리위원회"

# 재시작 상태 설정
state:
  file: "data/state/crawl_state.json"

# 다운로드 설정
download:
  pdf_directory: "data/pdfs"
  metadata_directory: "data/metadata"
  ocr_ready_directory: "data/ocr_ready"
  chunk_size: 8192
  max_concurrent_downloads: 5

# 메타데이터 설정
metadata:
  batch_size: 100
  output_format: "json"
  include_fields:
    - id
    - title
    - date
    - category
    - url
    - pdf_path
    - status
    - download_date
    - file_size

# 로깅 설정
logging:
  level: "INFO"
  log_file: "logs/crawler.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# OCR 준비 설정
ocr:
  enabled: true
  image_format: "png"
  dpi: 300
  quality: 95
  status_tracking: true
